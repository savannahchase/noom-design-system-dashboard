<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design System Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lagoon: #05727A;
      --lagoon-dark: #045B62;
      --lagoon-light: #E8F5F5;
      --blueberry: #15333D;
      --blueberry-light: #E0EAED;
      --skylight: #DCF5F0;
      --sky: #B4E0D8;
      --off-white: #F6F4EE;
      --sand: #E4DECE;
      --black: #191717;
      --white: #FFFFFF;
      --grey1: #E8E8E8;
      --grey2: #AAAAAA;
      --grey3: #666666;
      --grey4: #444444;
      --grey5: #F4F4F4;
      --kale: #316700;
      --mint: #C8E3B1;
      --mint-light: #E3F1D8;
      --error-red: #C13515;
      --error-light: #FFEBEE;
      --warning-amber: #B8860B;
      --warning-light: #FFF3E0;
      --purple: #7C3AED;
      --purple-light: #F3E8FF;
      --blue: #1565C0;
      --blue-light: #E8F0FE;
      --orange: #E65100;
      --orange-light: #FFF3E0;
      --font-headline: 'Untitled Serif', Georgia, serif;
      --font-body: 'Untitled Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-label: 'Untitled Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 25px;
      --sidebar-width: 220px;
      --shadow: 0px 0px 4px 1px rgba(0,0,0,0.06), 1px 2px 6px 0px rgba(0,0,0,0.08);
      --shadow-lg: 0px 4px 16px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--grey5); color: var(--black); min-height: 100vh; display: flex; }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar { width: var(--sidebar-width); background: var(--white); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; border-right: 1px solid var(--grey1); }
    .sidebar-header { padding: 28px 20px 20px; }
    .sidebar-header h1 { font-family: var(--font-headline); font-size: 18px; font-weight: 500; color: var(--black); line-height: 1.3; }
    .sidebar-header p { font-family: var(--font-label); font-size: 10px; font-weight: 300; color: var(--grey2); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 8px 10px; overflow-y: auto; }
    .nav-section-label { font-family: var(--font-label); font-size: 10px; font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey2); padding: 16px 10px 4px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 400; color: var(--grey3); transition: all 0.15s ease; user-select: none; }
    .nav-item:hover { background: var(--grey5); color: var(--black); }
    .nav-item.active { background: var(--grey5); color: var(--black); font-weight: 500; }
    .nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--grey2); }
    .nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item.active .nav-icon { color: var(--black); }
    .nav-badge { margin-left: auto; font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); padding: 1px 6px; border-radius: var(--radius-pill); }
    .nav-item.active .nav-badge { color: var(--black); font-weight: 600; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--grey1); font-size: 11px; color: var(--grey2); }

    /* ── Main ─────────────────────────────────── */
    .main { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; }
    .top-bar { background: var(--white); border-bottom: 1px solid var(--grey1); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .top-bar-left h2 { font-family: var(--font-body); font-size: 20px; font-weight: 600; line-height: 1.3; }
    .top-bar-left .team-prefix { font-family: var(--font-label); font-size: 11px; font-weight: 300; letter-spacing: 0.06em; text-transform: uppercase; color: var(--grey2); display: block; margin-bottom: 2px; }
    .top-bar-actions { display: flex; gap: 8px; align-items: center; }
    .content { padding: 32px 40px 64px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Buttons ──────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-md); border: none; cursor: pointer; transition: all 0.15s ease; user-select: none; }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-primary:hover { background: var(--grey4); }
    .btn-secondary { background: var(--white); color: var(--black); border: 1px solid var(--grey1); }
    .btn-secondary:hover { background: var(--grey5); }
    .btn-sm { font-size: 12px; padding: 5px 12px; }

    /* ── Stat Cards ───────────────────────────── */
    .stat-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); padding: 16px 20px; flex: 1; min-width: 140px; }
    .stat-card .stat-value { font-family: var(--font-body); font-size: 28px; font-weight: 600; color: var(--black); }
    .stat-card .stat-label { font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-card .stat-sub { font-size: 12px; color: var(--grey3); margin-top: 6px; }
    .stat-card .stat-bar { height: 4px; background: var(--grey1); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .stat-card .stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .stat-card.stat-lagoon { border-left: 3px solid var(--lagoon); } .stat-card.stat-lagoon .stat-value { color: var(--lagoon); }
    .stat-card.stat-kale { border-left: 3px solid var(--kale); } .stat-card.stat-kale .stat-value { color: var(--kale); }
    .stat-card.stat-warning { border-left: 3px solid var(--warning-amber); } .stat-card.stat-warning .stat-value { color: var(--warning-amber); }
    .stat-card.stat-error { border-left: 3px solid var(--error-red); } .stat-card.stat-error .stat-value { color: var(--error-red); }

    /* ── Section Headers ─────────────────────── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-header h3 { font-family: var(--font-label); font-size: 12px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey3); }
    .section-count { font-size: 12px; color: var(--grey2); }

    /* ── Filters ──────────────────────────────── */
    .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .search-input { padding: 7px 12px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; background: var(--white); color: var(--black); outline: none; width: 240px; transition: border-color 0.15s; }
    .search-input::placeholder { color: var(--grey2); }
    .search-input:focus { border-color: var(--lagoon); }
    .filter-pill { padding: 5px 14px; border-radius: var(--radius-pill); border: 1px solid var(--grey1); background: var(--white); font-family: var(--font-label); font-size: 12px; font-weight: 300; color: var(--grey3); cursor: pointer; transition: all 0.15s; }
    .filter-pill:hover { border-color: var(--grey2); color: var(--grey4); }
    .filter-pill.active { background: var(--black); color: var(--white); border-color: var(--black); }
    .filter-divider { width: 1px; height: 20px; background: var(--grey1); }
    .spacer { flex: 1; }
    .view-toggle { display: flex; }
    .view-toggle-btn { background: none; border: 1px solid var(--grey1); cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--grey2); transition: all 0.15s; }
    .view-toggle-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .view-toggle-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-left: none; }
    .view-toggle-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

    /* ── Add Component Form ────────────────────── */
    .add-comp-form { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); margin-bottom: 12px; }
    .add-comp-input { font-family: var(--font-body); font-size: 13px; padding: 6px 12px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); background: var(--white); color: var(--black); outline: none; transition: border-color 0.15s; }
    .add-comp-input:focus { border-color: var(--lagoon); }
    .add-comp-input::placeholder { color: var(--grey2); }
    .add-comp-select { font-family: var(--font-body); font-size: 13px; padding: 6px 12px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); background: var(--white); color: var(--black); outline: none; cursor: pointer; }
    .add-comp-select:focus { border-color: var(--lagoon); }

    /* ── Tables ───────────────────────────────── */
    .table-wrap { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey2); padding: 12px 16px; border-bottom: 1px solid var(--grey1); white-space: nowrap; position: sticky; top: 0; background: var(--white); z-index: 10; }
    thead th:first-child { padding-left: 20px; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--grey5); }
    tbody tr.detail-row { background: var(--grey5); }
    tbody tr.detail-row:hover { background: var(--grey5); }
    tbody td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid var(--grey5); vertical-align: middle; }
    tbody td:first-child { padding-left: 20px; }
    tbody tr:last-child td { border-bottom: none; }
    .comp-name { font-weight: 600; color: var(--black); white-space: nowrap; }
    .category-label { font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); text-transform: uppercase; letter-spacing: 0.04em; }
    .group-row td { background: var(--grey5); font-family: var(--font-label); font-weight: 300; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey3); padding: 8px 20px; border-bottom: 1px solid var(--grey1); }

    /* ── Status Pills ─────────────────────────── */
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: var(--radius-pill); font-family: var(--font-label); font-size: 11px; font-weight: 300; letter-spacing: 0.02em; }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pill-done { background: var(--mint-light); color: var(--kale); } .pill-done .pill-dot { background: var(--kale); }
    .pill-partial { background: var(--warning-light); color: var(--warning-amber); } .pill-partial .pill-dot { background: var(--warning-amber); }
    .pill-in_progress { background: var(--warning-light); color: var(--warning-amber); } .pill-in_progress .pill-dot { background: var(--warning-amber); }
    .pill-changes_needed { background: var(--orange-light); color: var(--orange); } .pill-changes_needed .pill-dot { background: var(--orange); }
    .pill-ready_for_eng { background: var(--skylight); color: var(--lagoon); } .pill-ready_for_eng .pill-dot { background: var(--lagoon); }
    .pill-missing { background: var(--error-light); color: var(--error-red); } .pill-missing .pill-dot { background: var(--error-red); }
    .pill-no_design { background: var(--error-light); color: var(--error-red); } .pill-no_design .pill-dot { background: var(--error-red); }
    .pill-na { background: var(--grey5); color: var(--grey2); } .pill-na .pill-dot { background: var(--grey2); }

    /* ── Code Location Badges ────────────────── */

    /* ── Readiness Bar ───────────────────────── */
    .readiness { display: flex; height: 4px; border-radius: 2px; overflow: hidden; background: var(--grey1); width: 72px; }
    .readiness-seg { height: 100%; } .readiness-seg.r-done { background: var(--kale); } .readiness-seg.r-partial { background: var(--warning-amber); }

    /* ── Tier Badge ───────────────────────────── */
    .tier-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
    .tier-badge.t1 { background: var(--error-light); color: var(--error-red); }
    .tier-badge.t2 { background: var(--warning-light); color: var(--warning-amber); }
    .tier-badge.t3 { background: var(--skylight); color: var(--lagoon); }
    .tier-badge.done { background: var(--mint-light); color: var(--kale); }

    /* ── Card Grid ───────────────────────────── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
    .comp-card { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); overflow: hidden; transition: border-color 0.15s; }
    .comp-card:hover { border-color: var(--grey2); }
    .comp-card-head { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--grey5); }
    .comp-card-head .comp-name { font-size: 14px; }
    .comp-card-body { padding: 12px 16px; }
    .comp-card-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 13px; color: var(--grey4); }
    .comp-card-row + .comp-card-row { border-top: 1px solid var(--grey5); }
    .comp-card-row .row-label { font-family: var(--font-label); font-size: 11px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.04em; color: var(--grey2); }

    /* ── Legend ───────────────────────────────── */
    .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; padding: 12px 16px; background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); }
    .legend-group { display: flex; align-items: center; gap: 12px; }
    .legend-title { font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey2); }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--grey3); }

    /* ── Phase Strip (inside overview page) ──── */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Owner Badges ────────────────────────── */
    .owner-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .owner-badge.design { background: var(--skylight); color: var(--lagoon); }
    .owner-badge.engineering { background: var(--purple-light); color: var(--purple); }
    .owner-badge.all { background: var(--blueberry-light); color: var(--blueberry); }
    .owner-badge.product { background: var(--orange-light); color: var(--orange); }

    /* ── Overview: Project Hero ──────────────── */
    .project-hero { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--grey1); padding: 40px; margin-bottom: 32px; }
    .project-hero-title { font-size: 24px; font-weight: 600; color: var(--black); background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 2px 6px; margin: -2px -6px 10px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; width: 100%; display: block; }
    .project-hero-title:hover { border-color: var(--grey1); }
    .project-hero-title:focus { border-color: var(--lagoon); background: var(--white); }
    .project-hero-desc { font-size: 14px; color: var(--grey4); line-height: 1.7; background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 6px; margin: -6px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; width: 100%; min-height: 60px; resize: vertical; display: block; }
    .project-hero-desc:hover { border-color: var(--grey1); }
    .project-hero-desc:focus { border-color: var(--lagoon); background: var(--white); }

    /* ── Overview: Roadmap ───────────────────── */
    .roadmap-title { font-size: 18px; font-weight: 600; color: var(--black); margin-bottom: 20px; }
    .roadmap { position: relative; padding-left: 40px; margin-bottom: 40px; }
    .roadmap::before { content: ''; position: absolute; left: 15px; top: 26px; bottom: 20px; width: 2px; background: var(--grey1); }
    .roadmap-phase { position: relative; margin-bottom: 12px; background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--grey1); padding: 16px 20px; transition: border-color 0.15s; }
    .roadmap-phase:hover { border-color: var(--grey2); }
    .roadmap-phase::before { content: ''; position: absolute; left: -33px; top: 20px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--grey2); background: var(--white); }
    .roadmap-phase.done::before { background: var(--kale); border-color: var(--kale); }
    .roadmap-phase.active::before { background: var(--lagoon); border-color: var(--lagoon); box-shadow: 0 0 0 4px rgba(5,114,122,0.2); }
    .roadmap-phase.upcoming::before { background: var(--grey5); border-color: var(--grey2); }
    .roadmap-phase-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .roadmap-phase-num { font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); text-transform: uppercase; letter-spacing: 0.04em; }
    .roadmap-phase-name { font-size: 14px; font-weight: 600; color: var(--black); }
    .roadmap-phase-duration { font-size: 12px; color: var(--grey3); margin-left: auto; background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 2px 6px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; min-width: 60px; width: auto; text-align: right; }
    .roadmap-phase-duration:hover { border-color: var(--grey1); }
    .roadmap-phase-duration:focus { border-color: var(--lagoon); background: var(--white); color: var(--black); }
    .roadmap-phase-status { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 300; }
    .roadmap-phase-status.done { background: var(--mint-light); color: var(--kale); }
    .roadmap-phase-status.active { background: var(--skylight); color: var(--lagoon); }
    .roadmap-phase-status.upcoming { background: var(--grey5); color: var(--grey3); }
    .roadmap-phase-name-input { font-size: 14px; font-weight: 600; color: var(--black); background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 2px 6px; margin: -2px -6px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; min-width: 80px; width: auto; }
    .roadmap-phase-name-input:hover { border-color: var(--grey1); }
    .roadmap-phase-name-input:focus { border-color: var(--lagoon); background: var(--white); }
    .roadmap-task-list { list-style: none; padding: 0; margin: 0; }
    .roadmap-task { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
    .roadmap-task input[type="checkbox"] { margin-top: 3px; accent-color: var(--kale); cursor: pointer; flex-shrink: 0; }
    .roadmap-task-text { font-size: 12px; color: var(--grey4); line-height: 1.5; flex: 1; border: 1px solid transparent; border-radius: var(--radius-sm); background: transparent; outline: none; font-family: var(--font-body); padding: 2px 4px; margin: -2px -4px; transition: border-color 0.15s; min-width: 0; width: 100%; }
    .roadmap-task-text:hover { border-color: var(--grey1); color: var(--black); }
    .roadmap-task-text:focus { border-color: var(--lagoon); color: var(--black); background: var(--white); }
    .roadmap-task.completed .roadmap-task-text { text-decoration: line-through; color: var(--grey2); }
    .roadmap-task-remove { background: none; border: none; color: var(--grey2); cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1; opacity: 0; transition: opacity 0.15s; }
    .roadmap-task:hover .roadmap-task-remove { opacity: 1; }
    .roadmap-task-remove:hover { color: var(--error-red); }
    .roadmap-add-task { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .roadmap-add-task input { font-size: 12px; color: var(--grey4); border: 1px dashed var(--grey1); border-radius: var(--radius-sm); padding: 4px 8px; background: transparent; outline: none; font-family: var(--font-body); flex: 1; }
    .roadmap-add-task input:focus { border-color: var(--lagoon); border-style: solid; }
    .roadmap-add-task input::placeholder { color: var(--grey2); }
    .parallel-label { font-size: 10px; font-weight: 300; color: var(--lagoon); background: var(--skylight); padding: 2px 8px; border-radius: 100px; }

    /* ── Overview: Component Status Sections ── */
    .status-sections { margin-bottom: 40px; }
    .status-sections-title { font-size: 18px; font-weight: 600; color: var(--black); margin-bottom: 20px; }
    .status-columns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .status-group { margin-bottom: 12px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--grey1); background: var(--white); }
    .status-group-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; cursor: pointer; user-select: none; transition: background 0.15s; }
    .status-group-header:hover { filter: brightness(0.97); }
    .status-group-header.done-header { background: var(--mint-light); }
    .status-group-header.inprogress-header { background: var(--skylight); }
    .status-group-header.backlog-header { background: var(--grey5); }
    .status-group-label { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .status-group-header.done-header .status-group-label { color: var(--kale); }

// LOCALSTORAGE LAYER
// ═══════════════════════════════════════════

const LS_KEY = 'ds-component-overrides';

function loadOverrides() {
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : {}; }
  catch { return {}; }
}
function saveOverrides(overrides) { localStorage.setItem(LS_KEY, JSON.stringify(overrides)); }

function applyOverrides() {
  const overrides = loadOverrides();
  COMPONENTS.forEach(c => {
    const o = overrides[c.name];
    if (!o) return;
    if (o.figma !== undefined) c.figma = o.figma;
    if (o.waxStatus !== undefined) c.waxStatus = o.waxStatus;
    if (o.themeReady !== undefined) c.themeReady = o.themeReady;
    if (o.themes !== undefined) c.themes = o.themes;
    if (o.storybook !== undefined) c.storybook = o.storybook;
    if (o.codeConnect !== undefined) c.codeConnect = o.codeConnect;
    if (o.workflowStatus !== undefined) c.workflowStatus = o.workflowStatus;
    if (o.figmaNotes !== undefined) c.figmaNotes = o.figmaNotes;
    if (o.codeNotes !== undefined) c.codeNotes = o.codeNotes;
    if (o.storybookNotes !== undefined) c.storybookNotes = o.storybookNotes;
    if (o.codeConnectNotes !== undefined) c.codeConnectNotes = o.codeConnectNotes;
    if (o.project !== undefined) c.project = o.project;
    if (o.team !== undefined) c.team = o.team;
    if (o.engineer !== undefined) c.engineer = o.engineer;
  });
}

function updateComponent(name, field, value) {
  const comp = COMPONENTS.find(c => c.name === name);
  if (comp) comp[field] = value;
  const overrides = loadOverrides();
  if (!overrides[name]) overrides[name] = {};
  overrides[name][field] = value;
  saveOverrides(overrides);
}

// HELPERS
// ═══════════════════════════════════════════

const SL = { done:"Done", partial:"Partial", in_progress:"In Progress", ready_for_eng:"Ready for ENG", changes_needed:"Changes Needed", missing:"Missing", no_design:"No Design", na:"N/A" };
const WSL = { not_started:"Not Started", in_progress:"In Progress", in_review:"In Review", done:"Done", blocked:"Blocked" };

function dot() { return '<span class="pill-dot"></span>'; }
function pill(s) { return `<span class="pill pill-${s}">${dot()}${SL[s]||s}</span>`; }
function pct(n, d) { return d > 0 ? Math.round(n / d * 100) : 0; }
function esc(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function tierLabel(t) { return { "1":"T1", "2":"T2", "3":"T3", done:"Solid" }[t] || t; }
function tierClass(t) { return { "1":"t1", "2":"t2", "3":"t3", done:"done" }[t] || ""; }
function ownerLabel(o) { return { design:"Design", engineering:"Engineering", all:"All", product:"Product" }[o] || o; }
function figmaDotClass(s) {
  if (s === 'done' || s === 'ready_for_eng') return 'done';
  if (s === 'in_progress' || s === 'partial' || s === 'changes_needed') return 'in_progress';
  return 'missing';
}

function score(c) {
  let s=0,t=0;
  if(c.figma!=="na"){t+=2;if(c.figma==="done")s+=2;else if(c.figma==="partial"||c.figma==="in_progress"||c.figma==="ready_for_eng"||c.figma==="changes_needed")s+=1;}
  if(c.waxStatus!=="na"){t+=2;if(c.waxStatus==="done")s+=2;else if(c.waxStatus==="in_progress")s+=1;}
  if(c.themeReady){s+=1;} t+=1;
  if(c.storybook!=="na"){t+=1;if(c.storybook==="done")s+=1;}
  if(c.codeConnect!=="na"){t+=1;if(c.codeConnect==="done")s+=1;}
  return t>0?s/t:0;
}
function overall(c) { const s=score(c); return s>=0.9?"done":s>=0.3?"partial":"missing"; }

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[onclick="navigate('${page}')"]`);
  if (navEl) navEl.classList.add('active');
  const titles = { overview:"Overview", components:"Components", tokens:"Tokens" };
  document.getElementById('page-title').textContent = titles[page] || page;
}

function filterCategory(cat) {
  catFilter = cat;
  navigate('components');
  applyFilters();
}

  const inProgress = COMPONENTS.filter(c => c.workflowStatus === 'in_progress');

  let html = '';

  const heroTitle = projectHero.title;
  const heroDesc = projectHero.description;
  html += `<div class="project-hero">
    <input class="project-hero-title" value="${esc(heroTitle)}" onblur="updateProjectHero('title', this.value)">

  </div>`;

  html += `<div class="roadmap-title">Roadmap</div><div class="roadmap">`;
  ROADMAP.forEach((r, pi) => {
    const doneTasks = r.tasks.filter(t => t.done).length;
    const totalTasks = r.tasks.length;
    const autoStatus = totalTasks === 0 ? r.status : doneTasks === totalTasks ? 'done' : doneTasks > 0 ? 'active' : 'upcoming';
    html += `<div class="roadmap-phase ${autoStatus}">
      <div class="roadmap-phase-header">
        <span class="roadmap-phase-num">Phase ${r.phase}</span>
        <input class="roadmap-phase-name-input" value="${esc(r.name)}" size="${r.name.length + 2}" oninput="this.size=Math.max(10,this.value.length+2)" onblur="updatePhaseName(${pi}, this.value)">

        <span class="roadmap-phase-status ${autoStatus}">${doneTasks}/${totalTasks} tasks</span>
      </div>
      <div class="roadmap-task-list">
        ${r.tasks.map((t, ti) => `<div class="roadmap-task${t.done ? ' completed' : ''}">

          <input class="roadmap-task-text" value="${esc(t.text)}" onblur="updateTaskText(${pi}, ${ti}, this.value)">
          <button class="roadmap-task-remove" onclick="removeRoadmapTask(${pi}, ${ti})" title="Remove task">&times;</button>
        </div>`).join('')}

      <div class="roadmap-add-task">

      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('overview-content').innerHTML = html;
}

function renderStatusGroup(label, statusKey, components, headerClass) {
  const isCollapsed = statusKey === 'backlog' && components.length > 20 ? ' collapsed' : '';
  let html = `<div class="status-group${isCollapsed}" id="group-${statusKey}">
    <div class="status-group-header ${headerClass}" onclick="toggleGroup('${statusKey}')">

      <span class="chevron-icon">&#9654;</span>

  html += `</div></div>`;

// ═══════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════

function toggleGroup(statusKey) {
  const group = document.getElementById('group-' + statusKey);
  if (group) group.classList.toggle('collapsed');
}

function toggleCompRow(summaryEl) {
  summaryEl.closest('.comp-row').classList.toggle('expanded');
}

function changeWorkflow(name, value) {
  updateComponent(name, 'workflowStatus', value);
  renderOverview();
  renderComponents();
}

function changeField(name, field, value) {
  updateComponent(name, field, value);
  if (field === 'figma' || field === 'waxStatus' || field === 'themeReady' || field === 'themes' || field === 'storybook' || field === 'codeConnect') {
    renderComponents();
  }
}

function toggleTheme(name, theme, checked) {
  const comp = COMPONENTS.find(c => c.name === name);
  if (!comp) return;
  let themes = [...(comp.themes || [])];
  if (checked && !themes.includes(theme)) themes.push(theme);
  if (!checked) themes = themes.filter(t => t !== theme);
  updateComponent(name, 'themes', themes);
  renderComponents();
}

function addThemeOption(inputEl) {
  const val = inputEl.value.trim();
  if (!val || THEME_OPTIONS.includes(val)) { inputEl.value = ''; return; }
  THEME_OPTIONS.push(val);
  localStorage.setItem('ds-theme-options', JSON.stringify(THEME_OPTIONS));
  inputEl.value = '';
  renderComponents();
  renderOverview();
}

// ═══════════════════════════════════════════
// ROADMAP TASK MANAGEMENT
// ═══════════════════════════════════════════

function saveRoadmap() { localStorage.setItem('ds-roadmap', JSON.stringify(ROADMAP)); }

function loadRoadmap() {
  const saved = JSON.parse(localStorage.getItem('ds-roadmap') || 'null');
  if (!saved) return;
  ROADMAP.length = 0;
  saved.forEach(p => ROADMAP.push(p));
}

function toggleRoadmapTask(phaseIdx, taskIdx, checked) {
  ROADMAP[phaseIdx].tasks[taskIdx].done = checked;
  saveRoadmap();
  renderOverview();
}

function updateTaskText(phaseIdx, taskIdx, text) {
  ROADMAP[phaseIdx].tasks[taskIdx].text = text;
  saveRoadmap();
}

function updateProjectHero(field, value) {
  projectHero[field] = value;
  localStorage.setItem('ds-project-hero', JSON.stringify(projectHero));
}

function updatePhaseName(phaseIdx, name) {
  ROADMAP[phaseIdx].name = name;
  saveRoadmap();
}

function updatePhaseDuration(phaseIdx, duration) {
  ROADMAP[phaseIdx].duration = duration;
  saveRoadmap();
}

function addRoadmapTask(phaseIdx, text) {
  ROADMAP[phaseIdx].tasks.push({ text, done: false });
  saveRoadmap();
  renderOverview();
}

function removeRoadmapTask(phaseIdx, taskIdx) {
  ROADMAP[phaseIdx].tasks.splice(taskIdx, 1);
  saveRoadmap();
  renderOverview();
}

  const total = COMPONENTS.length;

  const waxDone = COMPONENTS.filter(c => c.waxStatus === 'done').length;
  const themeReadyCount = COMPONENTS.filter(c => c.themeReady).length;
  const sbDone = COMPONENTS.filter(c => c.storybook === 'done').length;
  const ccDone = COMPONENTS.filter(c => c.codeConnect === 'done').length;

  document.getElementById('comp-stats').innerHTML = `
    <div class="stat-card stat-lagoon"><div class="stat-value">${figmaDone}/${total}</div><div class="stat-label">Figma</div></div>
    <div class="stat-card stat-kale"><div class="stat-value">${waxDone}/${total}</div><div class="stat-label">Wax</div></div>

  const q = (document.getElementById('comp-search')?.value || '').toLowerCase();

  if (statusFilter !== 'all' && c.workflowStatus !== statusFilter) return false;
  if (catFilter !== 'all' && c.cat !== catFilter) return false;
  return true;
}

function renderCards() {
  const filtered = COMPONENTS.filter(matchesFilter);
  if (!filtered.length) { document.getElementById('card-view').innerHTML = '<div class="empty" style="grid-column:1/-1">No components match.</div>'; return; }
  document.getElementById('card-view').innerHTML = filtered.map(c =>
    `<div class="comp-card"><div class="comp-card-head"><span class="comp-name">${c.name}</span><span class="category-label">${c.cat}</span></div>
    <div class="comp-card-body">
      <div class="comp-card-row"><span class="row-label">Figma</span>${pill(c.figma)}</div>
      <div class="comp-card-row"><span class="row-label">Wax</span>${pill(c.waxStatus === 'done' ? 'done' : c.waxStatus === 'in_progress' ? 'partial' : 'missing')}</div>
      <div class="comp-card-row"><span class="row-label">Storybook</span>${pill(c.storybook)}</div>
      <div class="comp-card-row"><span class="row-label">Code Connect</span>${pill(c.codeConnect)}</div>
    </div></div>`
  ).join('');

function toggleTableDetail(name) {
  const id = 'detail-' + name.replace(/[\s\/()]/g, '_');
  const row = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (row) {
    const open = row.style.display === 'none';
    row.style.display = open ? 'table-row' : 'none';
    if (chev) chev.classList.toggle('open', open);
  }
}

let compDragIdx = null;

function compDragStart(e) {
  const row = e.currentTarget;
  compDragIdx = parseInt(row.dataset.compIdx, 10);
  row.classList.add('dragging-row');
  e.dataTransfer.effectAllowed = 'move';
}

function compDragEnd(e) {
  compDragIdx = null;
  document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('dragging-row', 'drag-over-row'));
}

function compDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('drag-over-row'));
  if (row.dataset.compIdx !== undefined && parseInt(row.dataset.compIdx, 10) !== compDragIdx) {
    row.classList.add('drag-over-row');
  }
}

function compDrop(e) {
  e.preventDefault();
  const targetIdx = parseInt(e.currentTarget.dataset.compIdx, 10);
  if (compDragIdx === null || compDragIdx === targetIdx) return;
  const item = COMPONENTS.splice(compDragIdx, 1)[0];
  COMPONENTS.splice(targetIdx, 0, item);
  saveComponentOrder();
  renderTable();
  renderOverview();
}

function saveComponentOrder() {
  const order = COMPONENTS.map(c => c.name);
  localStorage.setItem('ds-comp-order', JSON.stringify(order));
}

function loadComponentOrder() {
  const saved = JSON.parse(localStorage.getItem('ds-comp-order') || 'null');
  if (!saved) return;
  const byName = {};
  COMPONENTS.forEach(c => byName[c.name] = c);
  const reordered = [];
  saved.forEach(name => { if (byName[name]) { reordered.push(byName[name]); delete byName[name]; } });
  Object.values(byName).forEach(c => reordered.push(c));
  COMPONENTS.length = 0;
  reordered.forEach(c => COMPONENTS.push(c));
}

function toggleAddComponent() {
  const form = document.getElementById('add-comp-form');
  const visible = form.style.display !== 'none';
  form.style.display = visible ? 'none' : 'flex';
  if (!visible) {
    const cats = [...new Set(COMPONENTS.map(c => c.cat))];
    const sel = document.getElementById('add-comp-cat');
    sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="__new__">+ New category…</option>';
    sel.onchange = function() {
      document.getElementById('add-comp-cat-new').style.display = this.value === '__new__' ? 'inline-block' : 'none';
    };
    document.getElementById('add-comp-name').value = '';
    document.getElementById('add-comp-cat-new').value = '';
    document.getElementById('add-comp-cat-new').style.display = 'none';
    document.getElementById('add-comp-name').focus();
  }
}

function submitAddComponent() {
  const nameInput = document.getElementById('add-comp-name');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  if (COMPONENTS.some(c => c.name.toLowerCase() === name.toLowerCase())) {
    alert('A component with that name already exists.');
    nameInput.focus();
    return;
  }
  const catSel = document.getElementById('add-comp-cat');
  let cat = catSel.value;
  if (cat === '__new__') {
    cat = document.getElementById('add-comp-cat-new').value.trim();
    if (!cat) { document.getElementById('add-comp-cat-new').focus(); return; }
  }
  const newComp = {
    name, cat, tier: "1", figma: "no_design", waxStatus: "not_started", themeReady: false, themes: [], storybook: "missing", codeConnect: "missing", workflowStatus: "backlog",
    figmaNotes: "", codeNotes: "", storybookNotes: "", codeConnectNotes: "",
    project: "", team: "", engineer: ""
  };
  COMPONENTS.push(newComp);
  saveComponentOrder();
  const overrides = loadOverrides();
  overrides[name] = { ...newComp };
  saveOverrides(overrides);
  localStorage.setItem('ds-added-components', JSON.stringify(
    JSON.parse(localStorage.getItem('ds-added-components') || '[]').concat([newComp])
  ));
  toggleAddComponent();
  renderCategoryNav();
  renderComponents();
  renderOverview();
}

function loadAddedComponents() {
  const added = JSON.parse(localStorage.getItem('ds-added-components') || '[]');
  added.forEach(ac => {
    if (!COMPONENTS.some(c => c.name === ac.name)) {
      COMPONENTS.push(ac);
    }
  });
}

function setCompFilter(btn, value) {
  statusFilter = value;
  btn.closest('.filters').querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() { renderTable(); renderCards(); }

function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
  if (view === 'table') {
    document.querySelector('.view-toggle-btn:first-child').classList.add('active');
    document.getElementById('table-view').style.display = 'block';
    document.getElementById('card-view').style.display = 'none';
  } else {
    document.querySelector('.view-toggle-btn:last-child').classList.add('active');
    document.getElementById('table-view').style.display = 'none';
    document.getElementById('card-view').style.display = 'grid';
  }
}

// ═══════════════════════════════════════════
// RENDER — TOKENS
// ═══════════════════════════════════════════

function renderTokens() {
  const groups = [{key:"colors",title:"Color Tokens"},{key:"spacing",title:"Spacing Tokens"},{key:"typography",title:"Typography Tokens"},{key:"radii",title:"Radius Tokens"}];
  let statHtml = '', gridHtml = '';
  const sc = ["stat-lagoon","stat-warning","stat-lagoon","stat-kale"];
  groups.forEach((g, i) => {
    const tokens = TOKENS[g.key], inF = tokens.filter(t => t.f).length, total = tokens.length;
    statHtml += `<div class="stat-card ${sc[i]}"><div class="stat-value">${inF}/${total}</div><div class="stat-label">${g.title}</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${pct(inF,total)}%;background:${i===1?'var(--warning-amber)':'var(--lagoon)'}"></div></div></div>`;
    gridHtml += `<div class="token-card"><div class="token-card-head">${g.title}<span class="token-count">${inF}/${total} in Figma</span></div><div class="token-card-body">`;
    tokens.forEach(t => {
      const swatch = g.key === "colors" ? `<span class="token-swatch" style="background:${t.v}"></span>` : "";
      const fp = t.f ? `<span class="pill pill-done" style="font-size:10px;padding:2px 7px">${dot()}Figma</span>` : `<span class="pill pill-missing" style="font-size:10px;padding:2px 7px">${dot()}Missing</span>`;
      const wp = `<span class="pill pill-na" style="font-size:10px;padding:2px 7px">${dot()}Audit</span>`;
      gridHtml += `<div class="token-row"><span class="token-name">${swatch}${t.n}</span><span style="display:flex;gap:6px;align-items:center"><span class="token-val">${t.v}</span><span style="display:flex;gap:4px">${fp}${wp}</span></span></div>`;
    });
    gridHtml += `</div></div>`;
  });
  document.getElementById('token-stats').innerHTML = statHtml;
  document.getElementById('tokens-grid').innerHTML = gridHtml;
}

// ═══════════════════════════════════════════
// CATEGORY NAV + EXPORT
// ═══════════════════════════════════════════

function renderCategoryNav() {
  const cats = [...new Set(COMPONENTS.map(c => c.cat))];
  document.getElementById('category-nav').innerHTML = cats.map(cat =>
    `<div class="nav-item" onclick="filterCategory('${cat}')"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/></svg></span>${cat}<span class="nav-badge">${COMPONENTS.filter(c => c.cat === cat).length}</span></div>`
  ).join('');
}

function exportData() {
  const blob = new Blob([JSON.stringify({ components: COMPONENTS, tokens: TOKENS, phases: ROADMAP }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'design-system-data.json'; a.click();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

loadRoadmap();
loadAddedComponents();
loadComponentOrder();
applyOverrides();
renderCategoryNav();
renderOverview();
renderComponents();
renderTokens();
</script>
