<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design System Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lagoon: #05727A;
      --lagoon-dark: #045B62;
      --lagoon-light: #E8F5F5;
      --blueberry: #15333D;
      --blueberry-light: #E0EAED;
      --skylight: #DCF5F0;
      --sky: #B4E0D8;
      --off-white: #F6F4EE;
      --sand: #E4DECE;
      --black: #191717;
      --white: #FFFFFF;
      --grey1: #E8E8E8;
      --grey2: #AAAAAA;
      --grey3: #666666;
      --grey4: #444444;
      --grey5: #F4F4F4;
      --kale: #316700;
      --mint: #C8E3B1;
      --mint-light: #E3F1D8;
      --error-red: #C13515;
      --error-light: #FFEBEE;
      --warning-amber: #B8860B;
      --warning-light: #FFF3E0;
      --purple: #7C3AED;
      --purple-light: #F3E8FF;
      --blue: #1565C0;
      --blue-light: #E8F0FE;
      --orange: #E65100;
      --orange-light: #FFF3E0;
      --font-headline: 'Untitled Serif', Georgia, serif;
      --font-body: 'Untitled Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-label: 'Untitled Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 25px;
      --sidebar-width: 220px;
      --shadow: 0px 0px 4px 1px rgba(0,0,0,0.06), 1px 2px 6px 0px rgba(0,0,0,0.08);
      --shadow-lg: 0px 4px 16px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--grey5); color: var(--black); min-height: 100vh; display: flex; }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar { width: var(--sidebar-width); background: var(--white); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; border-right: 1px solid var(--grey1); }
    .sidebar-header { padding: 28px 20px 20px; }
    .sidebar-header h1 { font-family: var(--font-headline); font-size: 18px; font-weight: 500; color: var(--black); line-height: 1.3; }
    .sidebar-header p { font-family: var(--font-label); font-size: 10px; font-weight: 300; color: var(--grey2); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 8px 10px; overflow-y: auto; }
    .nav-section-label { font-family: var(--font-label); font-size: 10px; font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey2); padding: 16px 10px 4px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 400; color: var(--grey3); transition: all 0.15s ease; user-select: none; }
    .nav-item:hover { background: var(--grey5); color: var(--black); }
    .nav-item.active { background: var(--grey5); color: var(--black); font-weight: 500; }
    .nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--grey2); }
    .nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item.active .nav-icon { color: var(--black); }
    .nav-badge { margin-left: auto; font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); padding: 1px 6px; border-radius: var(--radius-pill); }
    .nav-item.active .nav-badge { color: var(--black); font-weight: 600; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--grey1); font-size: 11px; color: var(--grey2); }

    /* ── Main ─────────────────────────────────── */
    .main { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; }
    .top-bar { background: var(--white); border-bottom: 1px solid var(--grey1); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .top-bar-left h2 { font-family: var(--font-body); font-size: 20px; font-weight: 600; line-height: 1.3; }
    .top-bar-left .team-prefix { font-family: var(--font-label); font-size: 11px; font-weight: 300; letter-spacing: 0.06em; text-transform: uppercase; color: var(--grey2); display: block; margin-bottom: 2px; }
    .top-bar-actions { display: flex; gap: 8px; align-items: center; }
    .content { padding: 32px 40px 64px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Buttons ──────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-md); border: none; cursor: pointer; transition: all 0.15s ease; user-select: none; }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-primary:hover { background: var(--grey4); }
    .btn-secondary { background: var(--white); color: var(--black); border: 1px solid var(--grey1); }
    .btn-secondary:hover { background: var(--grey5); }
    .btn-sm { font-size: 12px; padding: 5px 12px; }

    /* ── Stat Cards ───────────────────────────── */
    .stat-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); padding: 16px 20px; flex: 1; min-width: 140px; }
    .stat-card .stat-value { font-family: var(--font-body); font-size: 28px; font-weight: 600; color: var(--black); }
    .stat-card .stat-label { font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-card .stat-sub { font-size: 12px; color: var(--grey3); margin-top: 6px; }
    .stat-card .stat-bar { height: 4px; background: var(--grey1); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .stat-card .stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .stat-card.stat-lagoon { border-left: 3px solid var(--lagoon); } .stat-card.stat-lagoon .stat-value { color: var(--lagoon); }
    .stat-card.stat-kale { border-left: 3px solid var(--kale); } .stat-card.stat-kale .stat-value { color: var(--kale); }
    .stat-card.stat-warning { border-left: 3px solid var(--warning-amber); } .stat-card.stat-warning .stat-value { color: var(--warning-amber); }
    .stat-card.stat-error { border-left: 3px solid var(--error-red); } .stat-card.stat-error .stat-value { color: var(--error-red); }

    /* ── Section Headers ─────────────────────── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-header h3 { font-family: var(--font-label); font-size: 12px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey3); }
    .section-count { font-size: 12px; color: var(--grey2); }

    /* ── Filters ──────────────────────────────── */
    .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .search-input { padding: 7px 12px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; background: var(--white); color: var(--black); outline: none; width: 240px; transition: border-color 0.15s; }
    .search-input::placeholder { color: var(--grey2); }
    .search-input:focus { border-color: var(--lagoon); }
    .filter-pill { padding: 5px 14px; border-radius: var(--radius-pill); border: 1px solid var(--grey1); background: var(--white); font-family: var(--font-label); font-size: 12px; font-weight: 300; color: var(--grey3); cursor: pointer; transition: all 0.15s; }
    .filter-pill:hover { border-color: var(--grey2); color: var(--grey4); }
    .filter-pill.active { background: var(--black); color: var(--white); border-color: var(--black); }
    .filter-divider { width: 1px; height: 20px; background: var(--grey1); }
    .spacer { flex: 1; }
    .view-toggle { display: flex; }
    .view-toggle-btn { background: none; border: 1px solid var(--grey1); cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--grey2); transition: all 0.15s; }
    .view-toggle-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .view-toggle-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-left: none; }
    .view-toggle-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

    /* ── Add Component Form ────────────────────── */
    .add-comp-form { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); margin-bottom: 12px; }
    .add-comp-input { font-family: var(--font-body); font-size: 13px; padding: 6px 12px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); background: var(--white); color: var(--black); outline: none; transition: border-color 0.15s; }
    .add-comp-input:focus { border-color: var(--lagoon); }
    .add-comp-input::placeholder { color: var(--grey2); }
    .add-comp-select { font-family: var(--font-body); font-size: 13px; padding: 6px 12px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); background: var(--white); color: var(--black); outline: none; cursor: pointer; }
    .add-comp-select:focus { border-color: var(--lagoon); }

    /* ── Tables ───────────────────────────────── */
    .table-wrap { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey2); padding: 12px 16px; border-bottom: 1px solid var(--grey1); white-space: nowrap; position: sticky; top: 0; background: var(--white); z-index: 10; }
    thead th:first-child { padding-left: 20px; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--grey5); }
    tbody tr.detail-row { background: var(--grey5); }
    tbody tr.detail-row:hover { background: var(--grey5); }
    tbody td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid var(--grey5); vertical-align: middle; }
    tbody td:first-child { padding-left: 20px; }
    tbody tr:last-child td { border-bottom: none; }
    .comp-name { font-weight: 600; color: var(--black); white-space: nowrap; }
    .category-label { font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); text-transform: uppercase; letter-spacing: 0.04em; }
    .group-row td { background: var(--grey5); font-family: var(--font-label); font-weight: 300; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey3); padding: 8px 20px; border-bottom: 1px solid var(--grey1); }

    /* ── Status Pills ─────────────────────────── */
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: var(--radius-pill); font-family: var(--font-label); font-size: 11px; font-weight: 300; letter-spacing: 0.02em; }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pill-done { background: var(--mint-light); color: var(--kale); } .pill-done .pill-dot { background: var(--kale); }
    .pill-partial { background: var(--warning-light); color: var(--warning-amber); } .pill-partial .pill-dot { background: var(--warning-amber); }
    .pill-in_progress { background: var(--warning-light); color: var(--warning-amber); } .pill-in_progress .pill-dot { background: var(--warning-amber); }
    .pill-changes_needed { background: var(--orange-light); color: var(--orange); } .pill-changes_needed .pill-dot { background: var(--orange); }
    .pill-ready_for_eng { background: var(--skylight); color: var(--lagoon); } .pill-ready_for_eng .pill-dot { background: var(--lagoon); }
    .pill-missing { background: var(--error-light); color: var(--error-red); } .pill-missing .pill-dot { background: var(--error-red); }
    .pill-no_design { background: var(--error-light); color: var(--error-red); } .pill-no_design .pill-dot { background: var(--error-red); }
    .pill-na { background: var(--grey5); color: var(--grey2); } .pill-na .pill-dot { background: var(--grey2); }

    /* ── Code Location Badges ────────────────── */

    /* ── Readiness Bar ───────────────────────── */
    .readiness { display: flex; height: 4px; border-radius: 2px; overflow: hidden; background: var(--grey1); width: 72px; }
    .readiness-seg { height: 100%; } .readiness-seg.r-done { background: var(--kale); } .readiness-seg.r-partial { background: var(--warning-amber); }

    /* ── Tier Badge ───────────────────────────── */
    .tier-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
    .tier-badge.t1 { background: var(--error-light); color: var(--error-red); }
    .tier-badge.t2 { background: var(--warning-light); color: var(--warning-amber); }
    .tier-badge.t3 { background: var(--skylight); color: var(--lagoon); }
    .tier-badge.done { background: var(--mint-light); color: var(--kale); }

    /* ── Card Grid ───────────────────────────── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
    .comp-card { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); overflow: hidden; transition: border-color 0.15s; }
    .comp-card:hover { border-color: var(--grey2); }
    .comp-card-head { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--grey5); }
    .comp-card-head .comp-name { font-size: 14px; }
    .comp-card-body { padding: 12px 16px; }
    .comp-card-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 13px; color: var(--grey4); }
    .comp-card-row + .comp-card-row { border-top: 1px solid var(--grey5); }
    .comp-card-row .row-label { font-family: var(--font-label); font-size: 11px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.04em; color: var(--grey2); }

    /* ── Legend ───────────────────────────────── */
    .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; padding: 12px 16px; background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); }
    .legend-group { display: flex; align-items: center; gap: 12px; }
    .legend-title { font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey2); }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--grey3); }

    /* ── Phase Strip (inside overview page) ──── */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Owner Badges ────────────────────────── */
    .owner-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .owner-badge.design { background: var(--skylight); color: var(--lagoon); }
    .owner-badge.engineering { background: var(--purple-light); color: var(--purple); }
    .owner-badge.all { background: var(--blueberry-light); color: var(--blueberry); }
    .owner-badge.product { background: var(--orange-light); color: var(--orange); }

    /* ── Overview: Project Hero ──────────────── */
    .project-hero { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--grey1); padding: 40px; margin-bottom: 32px; }
    .project-hero-title { font-size: 24px; font-weight: 600; color: var(--black); background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 2px 6px; margin: -2px -6px 10px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; width: 100%; display: block; }
    .project-hero-title:hover { border-color: var(--grey1); }
    .project-hero-title:focus { border-color: var(--lagoon); background: var(--white); }
    .project-hero-desc { font-size: 14px; color: var(--grey4); line-height: 1.7; background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 6px; margin: -6px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; width: 100%; min-height: 60px; resize: vertical; display: block; }
    .project-hero-desc:hover { border-color: var(--grey1); }
    .project-hero-desc:focus { border-color: var(--lagoon); background: var(--white); }

    /* ── Overview: Roadmap ───────────────────── */
    .roadmap-title { font-size: 18px; font-weight: 600; color: var(--black); margin-bottom: 20px; }
    .roadmap { position: relative; padding-left: 40px; margin-bottom: 40px; }
    .roadmap::before { content: ''; position: absolute; left: 15px; top: 26px; bottom: 20px; width: 2px; background: var(--grey1); }
    .roadmap-phase { position: relative; margin-bottom: 12px; background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--grey1); padding: 16px 20px; transition: border-color 0.15s; }
    .roadmap-phase:hover { border-color: var(--grey2); }
    .roadmap-phase::before { content: ''; position: absolute; left: -33px; top: 20px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--grey2); background: var(--white); }
    .roadmap-phase.done::before { background: var(--kale); border-color: var(--kale); }
    .roadmap-phase.active::before { background: var(--lagoon); border-color: var(--lagoon); box-shadow: 0 0 0 4px rgba(5,114,122,0.2); }
    .roadmap-phase.upcoming::before { background: var(--grey5); border-color: var(--grey2); }
    .roadmap-phase-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .roadmap-phase-num { font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey2); text-transform: uppercase; letter-spacing: 0.04em; }
    .roadmap-phase-name { font-size: 14px; font-weight: 600; color: var(--black); }
    .roadmap-phase-duration { font-size: 12px; color: var(--grey3); margin-left: auto; background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 2px 6px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; min-width: 60px; width: auto; text-align: right; }
    .roadmap-phase-duration:hover { border-color: var(--grey1); }
    .roadmap-phase-duration:focus { border-color: var(--lagoon); background: var(--white); color: var(--black); }
    .roadmap-phase-status { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 300; }
    .roadmap-phase-status.done { background: var(--mint-light); color: var(--kale); }
    .roadmap-phase-status.active { background: var(--skylight); color: var(--lagoon); }
    .roadmap-phase-status.upcoming { background: var(--grey5); color: var(--grey3); }
    .roadmap-phase-name-input { font-size: 14px; font-weight: 600; color: var(--black); background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 2px 6px; margin: -2px -6px; outline: none; font-family: var(--font-body); transition: border-color 0.15s; min-width: 80px; width: auto; }
    .roadmap-phase-name-input:hover { border-color: var(--grey1); }
    .roadmap-phase-name-input:focus { border-color: var(--lagoon); background: var(--white); }
    .roadmap-task-list { list-style: none; padding: 0; margin: 0; }
    .roadmap-task { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
    .roadmap-task input[type="checkbox"] { margin-top: 3px; accent-color: var(--kale); cursor: pointer; flex-shrink: 0; }
    .roadmap-task-text { font-size: 12px; color: var(--grey4); line-height: 1.5; flex: 1; border: 1px solid transparent; border-radius: var(--radius-sm); background: transparent; outline: none; font-family: var(--font-body); padding: 2px 4px; margin: -2px -4px; transition: border-color 0.15s; min-width: 0; width: 100%; }
    .roadmap-task-text:hover { border-color: var(--grey1); color: var(--black); }
    .roadmap-task-text:focus { border-color: var(--lagoon); color: var(--black); background: var(--white); }
    .roadmap-task.completed .roadmap-task-text { text-decoration: line-through; color: var(--grey2); }
    .roadmap-task-remove { background: none; border: none; color: var(--grey2); cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1; opacity: 0; transition: opacity 0.15s; }
    .roadmap-task:hover .roadmap-task-remove { opacity: 1; }
    .roadmap-task-remove:hover { color: var(--error-red); }
    .roadmap-add-task { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .roadmap-add-task input { font-size: 12px; color: var(--grey4); border: 1px dashed var(--grey1); border-radius: var(--radius-sm); padding: 4px 8px; background: transparent; outline: none; font-family: var(--font-body); flex: 1; }
    .roadmap-add-task input:focus { border-color: var(--lagoon); border-style: solid; }
    .roadmap-add-task input::placeholder { color: var(--grey2); }
    .parallel-label { font-size: 10px; font-weight: 300; color: var(--lagoon); background: var(--skylight); padding: 2px 8px; border-radius: 100px; }

    /* ── Overview: Component Status Sections ── */
    .status-sections { margin-bottom: 40px; }
    .status-sections-title { font-size: 18px; font-weight: 600; color: var(--black); margin-bottom: 20px; }
    .status-columns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .status-group { margin-bottom: 12px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--grey1); background: var(--white); }
    .status-group-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; cursor: pointer; user-select: none; transition: background 0.15s; }
    .status-group-header:hover { filter: brightness(0.97); }
    .status-group-header.done-header { background: var(--mint-light); }
    .status-group-header.inprogress-header { background: var(--skylight); }
    .status-group-header.backlog-header { background: var(--grey5); }
    .status-group-label { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .status-group-header.done-header .status-group-label { color: var(--kale); }
    .status-group-header.inprogress-header .status-group-label { color: var(--lagoon); }
    .status-group-header.backlog-header .status-group-label { color: var(--grey4); }
    .status-count { font-size: 11px; font-weight: 300; padding: 2px 8px; border-radius: 100px; background: rgba(255,255,255,0.6); }
    .chevron-icon { font-size: 11px; transition: transform 0.2s; color: var(--grey3); }
    .status-group.collapsed .chevron-icon { transform: rotate(-90deg); }
    .status-group.collapsed .status-group-body { display: none; }
    .status-group-body { border-top: 1px solid var(--grey1); max-height: 400px; overflow-y: auto; }

    /* ── Component Row (expandable) ──────────── */
    .comp-row { border-bottom: 1px solid var(--grey1); }
    .comp-row:last-child { border-bottom: none; }
    .comp-row-summary { display: flex; align-items: center; padding: 10px 20px; cursor: pointer; gap: 12px; transition: background 0.1s; }
    .comp-row-summary:hover { background: var(--grey5); }
    .comp-row-name { font-size: 13px; font-weight: 600; color: var(--black); min-width: 160px; flex-shrink: 0; }
    .platform-dots { display: flex; gap: 5px; align-items: center; }
    .platform-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .platform-dot.done { background: var(--kale); }
    .platform-dot.partial, .platform-dot.in_progress, .platform-dot.ready_for_eng { background: var(--warning-amber); }
    .platform-dot.missing, .platform-dot.no_design { background: var(--error-red); }
    .platform-dot.buyflow, .platform-dot.proto { background: var(--warning-amber); }
    .platform-dot.wax { background: var(--kale); }
    .platform-dot.none { background: var(--error-red); }
    .platform-dot.na { background: var(--grey2); }
    .platform-dot-label { font-family: var(--font-label); font-size: 9px; color: var(--grey2); font-weight: 300; }
    .comp-row-spacer { flex: 1; }
    .comp-row-chevron { font-size: 10px; color: var(--grey3); transition: transform 0.2s; flex-shrink: 0; }
    .comp-row.expanded .comp-row-chevron { transform: rotate(90deg); }

    /* ── Inline Select ───────────────────────── */
    .inline-select { padding: 4px 8px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); font-size: 11px; font-family: inherit; font-weight: 300; background: var(--white); color: var(--grey4); cursor: pointer; outline: none; transition: border-color 0.15s; flex-shrink: 0; -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23AAA' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 6px center; padding-right: 20px; }
    .pill-select { padding: 3px 22px 3px 10px; border: none; border-radius: var(--radius-pill); font-family: var(--font-label); font-size: 11px; font-weight: 300; letter-spacing: 0.02em; cursor: pointer; outline: none; -webkit-appearance: none; appearance: none; background-repeat: no-repeat; background-position: right 6px center; background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%23999' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); }
    .pill-select.ps-done { background-color: var(--mint-light); color: var(--kale); }
    .pill-select.ps-in_progress, .pill-select.ps-partial { background-color: var(--warning-light); color: var(--warning-amber); }
    .pill-select.ps-changes_needed { background-color: var(--orange-light); color: var(--orange); }
    .pill-select.ps-ready_for_eng { background-color: var(--skylight); color: var(--lagoon); }
    .pill-select.ps-missing, .pill-select.ps-no_design { background-color: var(--error-light); color: var(--error-red); }
    .pill-select.ps-na { background-color: var(--grey5); color: var(--grey2); }
    .pill-select.ps-wax-done { background-color: var(--mint-light); color: var(--kale); }
    .pill-select.ps-wax-in_progress { background-color: var(--warning-light); color: var(--warning-amber); }
    .pill-select.ps-wax-not_started { background-color: var(--grey5); color: var(--grey3); }
    .pill-select.ps-wax-na { background-color: var(--grey5); color: var(--grey2); }
    .theme-ready-cb { accent-color: var(--kale); cursor: pointer; width: 16px; height: 16px; }
    .theme-checks { display: flex; flex-direction: column; gap: 4px; }
    .theme-check-label { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-label); font-size: 11px; font-weight: 300; color: var(--grey4); cursor: pointer; white-space: nowrap; }
    .theme-check-label input[type="checkbox"] { accent-color: var(--purple); cursor: pointer; }
    .detail-theme-section { display: flex; flex-direction: column; gap: 8px; padding: 8px 0; }
    .theme-checks-detail { display: flex; flex-wrap: wrap; gap: 8px; }
    .add-theme-row { margin-top: 4px; }
    .add-theme-input { font-size: 11px; font-family: var(--font-body); padding: 3px 8px; border: 1px dashed var(--grey1); border-radius: var(--radius-sm); background: transparent; outline: none; color: var(--grey4); width: 120px; }
    .add-theme-input:focus { border-color: var(--lagoon); border-style: solid; }
    .add-theme-input::placeholder { color: var(--grey2); }
    .comp-name-cell { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .comp-name-cell:hover .comp-name { color: var(--lagoon); }
    .table-chev { font-size: 10px; color: var(--grey2); transition: transform 0.2s; flex-shrink: 0; }
    .table-chev.open { transform: rotate(90deg); }
    .inline-select:focus { border-color: var(--lagoon); }
    .inline-select.status-done { color: var(--kale); border-color: var(--kale); background-color: var(--mint-light); }
    .inline-select.status-inprogress { color: var(--lagoon); border-color: var(--lagoon); background-color: var(--skylight); }
    .inline-select.status-backlog { color: var(--grey3); }

    /* ── Expanded Detail ─────────────────────── */
    .comp-detail { display: none; padding: 0 20px 16px; background: var(--grey5); border-top: 1px solid var(--grey1); }
    .comp-row.expanded .comp-detail { display: block; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 14px; }
    .detail-card { border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--grey1); }
    .detail-card.design-card { background: var(--skylight); border-color: rgba(5,114,122,0.15); }
    .detail-card.eng-card { background: var(--purple-light); border-color: rgba(124,58,237,0.12); }
    .detail-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .detail-card-title { font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; }
    .detail-card.design-card .detail-card-title { color: var(--lagoon); }
    .detail-card.eng-card .detail-card-title { color: var(--purple); }
    .detail-notes { width: 100%; min-height: 56px; border: 1px solid rgba(0,0,0,0.08); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 11px; font-family: inherit; line-height: 1.5; color: var(--grey4); background: rgba(255,255,255,0.7); resize: vertical; outline: none; transition: border-color 0.15s; }
    .detail-notes:focus { border-color: var(--lagoon); background: var(--white); }
    .assignment-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
    .assignment-field { display: flex; flex-direction: column; gap: 3px; }
    .assignment-label { font-family: var(--font-label); font-size: 10px; font-weight: 300; color: var(--grey3); text-transform: uppercase; letter-spacing: 0.04em; }
    .assignment-input { padding: 6px 10px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; background: var(--white); outline: none; transition: border-color 0.15s; }
    .assignment-input:focus { border-color: var(--lagoon); }

    /* ── Next Steps ──────────────────────────── */

    /* ── Tokens ───────────────────────────────── */
    .token-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; display: inline-block; vertical-align: middle; }
    .token-table-wrap { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); overflow: hidden; }
    .token-table-wrap table { width: 100%; border-collapse: collapse; }
    .token-table-wrap thead th { text-align: left; font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey2); padding: 10px 14px; border-bottom: 1px solid var(--grey1); white-space: nowrap; background: var(--white); position: sticky; top: 0; z-index: 5; }
    .token-table-wrap tbody tr { transition: background 0.1s; }
    .token-table-wrap tbody tr:hover { filter: brightness(0.97); }
    .token-table-wrap tbody td { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid var(--grey5); vertical-align: middle; }
    .token-table-wrap tbody tr:last-child td { border-bottom: none; }
    .tok-name { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; font-weight: 600; color: var(--black); }
    .tok-val { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: var(--grey3); display: flex; align-items: center; gap: 5px; }
    .tok-wax { font-family: 'SF Mono','Fira Code',monospace; font-size: 10px; color: var(--grey3); }
    .tok-col { font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.04em; color: var(--grey2); }
    /* status row tints */
    .tok-row-value_mismatch { background: #fff5f5; border-left: 3px solid var(--error-red) !important; }
    .tok-row-naming_mismatch { background: #fffbf0; border-left: 3px solid var(--warning-amber) !important; }
    .tok-row-figma_only { background: var(--purple-light); border-left: 3px solid var(--purple) !important; }
    .tok-row-wax_only { background: var(--skylight); border-left: 3px solid var(--lagoon) !important; }
    /* status badges for token table */
    .tok-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-pill); font-family: var(--font-label); font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
    .tok-badge.match { background: var(--mint-light); color: var(--kale); }
    .tok-badge.value_mismatch { background: var(--error-light); color: var(--error-red); }
    .tok-badge.naming_mismatch { background: var(--warning-light); color: var(--warning-amber); }
    .tok-badge.figma_only { background: var(--purple-light); color: var(--purple); }
    .tok-badge.wax_only { background: var(--skylight); color: var(--lagoon); }
    /* legacy section */
    .legacy-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 12px 0; font-family: var(--font-label); font-size: 11px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey3); user-select: none; border-top: 1px solid var(--grey1); margin-top: 24px; }
    .legacy-toggle:hover { color: var(--grey4); }
    .legacy-toggle .chev { font-size: 10px; transition: transform 0.2s; }
    .legacy-section.collapsed .chev { transform: rotate(-90deg); }
    .legacy-section.collapsed .legacy-body { display: none; }
    /* token summary bar */
    .tok-summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .tok-sum-card { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); padding: 12px 16px; flex: 1; min-width: 100px; text-align: center; }
    .tok-sum-val { font-size: 22px; font-weight: 600; color: var(--black); }
    .tok-sum-label { font-family: var(--font-label); font-size: 10px; font-weight: 300; color: var(--grey2); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

    /* ── Table Drag & Drop ────────────────────── */
    tr.dragging-row { opacity: 0.4; }
    tr.drag-over-row td { border-top: 2px solid var(--lagoon) !important; }
    .drag-handle { cursor: grab; color: var(--grey2); font-size: 14px; user-select: none; line-height: 1; padding: 0 4px; }
    .drag-handle:active { cursor: grabbing; }

    /* ── Empty ────────────────────────────────── */
    .empty { text-align: center; padding: 40px; color: var(--grey2); font-size: 13px; }

    /* ── Flagged Section ─────────────────────── */
    .flag-section-title { font-size: 18px; font-weight: 600; color: var(--black); margin-bottom: 6px; }
    .flag-section-sub { font-size: 13px; color: var(--grey3); margin-bottom: 24px; line-height: 1.6; }
    .flagged-filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .flag-group-label { font-family: var(--font-label); font-size: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey3); padding: 16px 0 8px; border-bottom: 1px solid var(--grey1); margin-bottom: 12px; margin-top: 8px; }
    .flag-card { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 10px; transition: border-color 0.15s; }
    .flag-card:hover { border-color: var(--grey2); }
    .flag-card.resolved { opacity: 0.62; }
    .flag-card.skipped { opacity: 0.5; }
    .flag-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .flag-id { font-family: var(--font-label); font-size: 11px; font-weight: 600; color: var(--grey3); letter-spacing: 0.05em; background: var(--grey5); padding: 3px 8px; border-radius: var(--radius-sm); flex-shrink: 0; }
    .flag-cat { font-family: var(--font-label); font-size: 10px; font-weight: 300; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: var(--radius-pill); flex-shrink: 0; }
    .flag-cat.value-mismatch { background: var(--error-light); color: var(--error-red); }
    .flag-cat.naming-mismatch { background: var(--warning-light); color: var(--warning-amber); }
    .flag-cat.missing-export { background: var(--purple-light); color: var(--purple); }
    .flag-token { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; font-weight: 600; color: var(--black); flex: 1; min-width: 0; }
    .flag-status-badge { padding: 3px 10px; border-radius: var(--radius-pill); font-family: var(--font-label); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0; margin-left: auto; }
    .flag-status-badge.open { background: var(--error-light); color: var(--error-red); }
    .flag-status-badge.resolved { background: var(--mint-light); color: var(--kale); }
    .flag-status-badge.skipped { background: var(--grey5); color: var(--grey3); }
    .flag-issue { font-size: 13px; color: var(--grey4); line-height: 1.6; margin-bottom: 4px; }
    .flag-impact { font-size: 12px; color: var(--grey3); line-height: 1.5; }
    .flag-impact strong { font-weight: 600; color: var(--grey4); }
    .flag-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
    .flag-notes { flex: 1; min-width: 200px; font-family: var(--font-body); font-size: 12px; padding: 6px 10px; border: 1px solid var(--grey1); border-radius: var(--radius-sm); background: var(--white); color: var(--grey4); outline: none; transition: border-color 0.15s; }
    .flag-notes:focus { border-color: var(--lagoon); }
    .flag-notes::placeholder { color: var(--grey2); }
    .flag-btn { font-family: var(--font-body); font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--grey1); background: var(--white); cursor: pointer; transition: all 0.15s; color: var(--grey3); white-space: nowrap; }
    .flag-btn:hover { border-color: var(--grey2); color: var(--black); }
    .flag-btn.btn-resolve { color: var(--kale); border-color: var(--kale); }
    .flag-btn.btn-resolve:hover { background: var(--mint-light); }
    .flag-btn.btn-skip { color: var(--warning-amber); border-color: var(--warning-amber); }
    .flag-btn.btn-skip:hover { background: var(--warning-light); }
    .flag-btn.btn-reopen { color: var(--lagoon); border-color: var(--lagoon); }
    .flag-btn.btn-reopen:hover { background: var(--skylight); }
    .resolved-section { margin-top: 32px; }
    .resolved-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 0; font-family: var(--font-label); font-size: 11px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey3); user-select: none; border-top: 1px solid var(--grey1); }
    .resolved-toggle:hover { color: var(--grey4); }
    .resolved-toggle .chev { font-size: 10px; transition: transform 0.2s; }
    .resolved-section.collapsed .chev { transform: rotate(-90deg); }
    .resolved-section.collapsed .resolved-body { display: none; }
    .flag-stat-card { background: var(--white); border: 1px solid var(--grey1); border-radius: var(--radius-md); padding: 14px 18px; flex: 1; min-width: 120px; }
    .flag-stat-value { font-size: 26px; font-weight: 600; }
    .flag-stat-label { font-family: var(--font-label); font-size: 10px; font-weight: 300; color: var(--grey2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .content { padding: 24px 16px 48px; }
      .top-bar { padding: 16px; }
      .detail-grid { grid-template-columns: 1fr; }
      .assignment-row { grid-template-columns: 1fr; }
      .status-columns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>Noom Neo</h1>
    <p>Design System Dashboard</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Views</div>
    <div class="nav-item active" onclick="navigate('overview')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
      Overview
    </div>
    <div class="nav-item" onclick="navigate('components')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></span>
      Components
      <span class="nav-badge" id="nav-comp-count">0</span>
    </div>
    <div class="nav-item" onclick="navigate('tokens')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
      Tokens
    </div>
    <div class="nav-item" onclick="navigate('flagged')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></span>
      Flagged
      <span class="nav-badge" id="nav-flagged-count">6</span>
    </div>
    <div class="nav-section-label">Filter by Category</div>
    <div class="nav-item" onclick="filterCategory('all')">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></span>
      All Categories
    </div>
    <div id="category-nav"></div>
  </nav>
  <div class="sidebar-footer">Last updated: Mar 6, 2026</div>
</div>

<div class="main">
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="team-prefix">Wax Component Library</span>
      <h2 id="page-title">Overview</h2>
    </div>
    <div class="top-bar-actions" id="top-actions">
      <button class="btn btn-secondary btn-sm" onclick="exportData()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
    </div>
  </div>

  <div class="content">

    <!-- ═══ OVERVIEW ═══ -->
    <div class="page active" id="page-overview">
      <div class="stat-row" id="overview-stats"></div>
      <div id="overview-content"></div>
    </div>

    <!-- ═══ COMPONENTS ═══ -->
    <div class="page" id="page-components">
      <div class="stat-row" id="comp-stats"></div>
      <div class="filters">
        <input type="text" class="search-input" placeholder="Search components..." oninput="applyFilters()" id="comp-search">
        <span class="filter-divider"></span>
        <button class="filter-pill active" onclick="setCompFilter(this,'all')">All</button>
        <button class="filter-pill" onclick="setCompFilter(this,'done')">Done</button>
        <button class="filter-pill" onclick="setCompFilter(this,'in_progress')">In Progress</button>
        <button class="filter-pill" onclick="setCompFilter(this,'backlog')">Backlog</button>
        <span class="spacer"></span>
        <button class="btn btn-primary btn-sm" onclick="toggleAddComponent()">+ Add Component</button>

let FLAGGED_ITEMS = [];

function loadFlagged() {
  const saved = JSON.parse(localStorage.getItem('ds-flagged') || 'null');
  if (!saved) {
    FLAGGED_ITEMS = DEFAULT_FLAGGED.map(f => ({ ...f }));
    return;
  }
  // Merge: keep saved state, add any new default items
  const savedById = {};
  saved.forEach(f => savedById[f.id] = f);
  FLAGGED_ITEMS = DEFAULT_FLAGGED.map(f => savedById[f.id] ? { ...f, ...savedById[f.id] } : { ...f });
  // Append any user-added items not in defaults
  saved.forEach(f => {
    if (!DEFAULT_FLAGGED.some(d => d.id === f.id)) FLAGGED_ITEMS.push({ ...f });
  });
}

function saveFlagged() {
  localStorage.setItem('ds-flagged', JSON.stringify(FLAGGED_ITEMS));
}

function setFlagStatus(id, status) {
  const item = FLAGGED_ITEMS.find(f => f.id === id);
  if (item) { item.status = status; saveFlagged(); renderFlagged(); }
}

function saveFlagNotes(id, notes) {
  const item = FLAGGED_ITEMS.find(f => f.id === id);
  if (item) { item.notes = notes; saveFlagged(); }
}

let flagFilter = 'all';

function setFlagFilter(btn, value) {
  flagFilter = value;
  btn.closest('.flagged-filter-bar').querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderFlagged();
}

function toggleResolvedSection() {
  const sec = document.getElementById('resolved-section');
  if (sec) sec.classList.toggle('collapsed');
}

function catClass(cat) {
  return { VALUE_MISMATCH: 'value-mismatch', NAMING_MISMATCH: 'naming-mismatch', MISSING_EXPORT: 'missing-export' }[cat] || '';
}

function catLabel(cat) {
  return { VALUE_MISMATCH: 'Value Mismatch', NAMING_MISMATCH: 'Naming Mismatch', MISSING_EXPORT: 'Missing Export' }[cat] || cat;
}

function renderFlagCard(f) {
  const cc = catClass(f.category);
  const sc = f.status;
  const actionBtns = sc === 'open'
    ? `<button class="flag-btn btn-resolve" onclick="setFlagStatus('${f.id}','resolved')">Mark Resolved</button>
       <button class="flag-btn btn-skip" onclick="setFlagStatus('${f.id}','skipped')">Deprioritize</button>`
    : `<button class="flag-btn btn-reopen" onclick="setFlagStatus('${f.id}','open')">Re-open</button>`;
  return `<div class="flag-card ${sc}" id="flag-card-${f.id}">
    <div class="flag-card-header">
      <span class="flag-id">${f.id}</span>
      <span class="flag-cat ${cc}">${catLabel(f.category)}</span>
      <span class="flag-token">${esc(f.token)}</span>
      <span class="flag-status-badge ${sc}">${sc.toUpperCase()}</span>
    </div>
    <div class="flag-issue">${esc(f.issue)}</div>
    <div class="flag-impact"><strong>Impact / Action:</strong> ${esc(f.impact)}</div>
    <div class="flag-actions">
      ${actionBtns}
      <input class="flag-notes" type="text" placeholder="Add a note…" value="${esc(f.notes || '')}" onblur="saveFlagNotes('${f.id}', this.value)">
    </div>
  </div>`;
}

function renderFlagged() {
  const openCount = FLAGGED_ITEMS.filter(f => f.status === 'open').length;
  const resolvedCount = FLAGGED_ITEMS.filter(f => f.status === 'resolved').length;
  const skippedCount = FLAGGED_ITEMS.filter(f => f.status === 'skipped').length;

  document.getElementById('nav-flagged-count').textContent = openCount || '';

  document.getElementById('flagged-stats').innerHTML = `
    <div class="flag-stat-card" style="border-left:3px solid var(--error-red)">
      <div class="flag-stat-value" style="color:var(--error-red)">${openCount}</div>
      <div class="flag-stat-label">Open</div>
    </div>
    <div class="flag-stat-card" style="border-left:3px solid var(--kale)">
      <div class="flag-stat-value" style="color:var(--kale)">${resolvedCount}</div>
      <div class="flag-stat-label">Resolved</div>
    </div>
    <div class="flag-stat-card" style="border-left:3px solid var(--grey2)">
      <div class="flag-stat-value" style="color:var(--grey3)">${skippedCount}</div>
      <div class="flag-stat-label">Skipped</div>
    </div>
    <div class="flag-stat-card">
      <div class="flag-stat-value">${FLAGGED_ITEMS.length}</div>
      <div class="flag-stat-label">Total Flags</div>
    </div>`;

  const filtered = flagFilter === 'all'
    ? FLAGGED_ITEMS
    : FLAGGED_ITEMS.filter(f => f.status === flagFilter);

  const active = filtered.filter(f => f.status === 'open');
  const closed = filtered.filter(f => f.status === 'resolved' || f.status === 'skipped');

  // Group active by category
  const cats = ['VALUE_MISMATCH', 'NAMING_MISMATCH', 'MISSING_EXPORT'];
  let html = `<div class="flag-section-title">Flagged Issues</div>
    <div class="flag-section-sub">Token mismatches and alignment decisions requiring engineering action or a team decision. Each item persists state across sessions.</div>
    <div class="flagged-filter-bar">
      <button class="filter-pill ${flagFilter === 'all' ? 'active' : ''}" onclick="setFlagFilter(this,'all')">All</button>
      <button class="filter-pill ${flagFilter === 'open' ? 'active' : ''}" onclick="setFlagFilter(this,'open')">Open</button>
      <button class="filter-pill ${flagFilter === 'resolved' ? 'active' : ''}" onclick="setFlagFilter(this,'resolved')">Resolved</button>
      <button class="filter-pill ${flagFilter === 'skipped' ? 'active' : ''}" onclick="setFlagFilter(this,'skipped')">Skipped / Deprioritized</button>
    </div>`;

  if (active.length === 0 && flagFilter !== 'all') {
    html += `<div class="empty">No items match this filter.</div>`;
  } else {
    cats.forEach(cat => {
      const items = active.filter(f => f.category === cat);
      if (items.length === 0) return;
      html += `<div class="flag-group-label">${catLabel(cat)}</div>`;
      items.forEach(f => { html += renderFlagCard(f); });
    });
    // Any uncategorized open items
    const uncatActive = active.filter(f => !cats.includes(f.category));
    uncatActive.forEach(f => { html += renderFlagCard(f); });
  }

  if (closed.length > 0) {
    html += `<div class="resolved-section" id="resolved-section">
      <div class="resolved-toggle" onclick="toggleResolvedSection()">
        <span class="chev">&#9654;</span>
        Resolved &amp; Skipped (${closed.length})
      </div>
      <div class="resolved-body">`;
    closed.forEach(f => { html += renderFlagCard(f); });
    html += `</div></div>`;
  }

  document.getElementById('flagged-content').innerHTML = html;
}

const LS_KEY = 'ds-component-overrides';

function loadOverrides() {
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : {}; }
  catch { return {}; }
}
function saveOverrides(overrides) { localStorage.setItem(LS_KEY, JSON.stringify(overrides)); }

function applyOverrides() {
  const overrides = loadOverrides();
  COMPONENTS.forEach(c => {
    const o = overrides[c.name];
    if (!o) return;
    if (o.figma !== undefined) c.figma = o.figma;
    if (o.waxStatus !== undefined) c.waxStatus = o.waxStatus;
    if (o.themeReady !== undefined) c.themeReady = o.themeReady;
    if (o.agentReady !== undefined) c.agentReady = o.agentReady;
    if (o.themes !== undefined) c.themes = o.themes;
    if (o.storybook !== undefined) c.storybook = o.storybook;
    if (o.codeConnect !== undefined) c.codeConnect = o.codeConnect;
    if (o.workflowStatus !== undefined) c.workflowStatus = o.workflowStatus;
    if (o.figmaNotes !== undefined) c.figmaNotes = o.figmaNotes;
    if (o.codeNotes !== undefined) c.codeNotes = o.codeNotes;
    if (o.storybookNotes !== undefined) c.storybookNotes = o.storybookNotes;
    if (o.codeConnectNotes !== undefined) c.codeConnectNotes = o.codeConnectNotes;
    if (o.project !== undefined) c.project = o.project;
    if (o.team !== undefined) c.team = o.team;
    if (o.engineer !== undefined) c.engineer = o.engineer;
  });
}

function updateComponent(name, field, value) {
  const comp = COMPONENTS.find(c => c.name === name);
  if (comp) comp[field] = value;
  const overrides = loadOverrides();
  if (!overrides[name]) overrides[name] = {};
  overrides[name][field] = value;
  saveOverrides(overrides);
}

const SL = { done:"Done", partial:"Partial", in_progress:"In Progress", ready_for_eng:"Ready for ENG", changes_needed:"Changes Needed", missing:"Missing", no_design:"No Design", na:"N/A" };
const WSL = { not_started:"Not Started", in_progress:"In Progress", in_review:"In Review", done:"Done", blocked:"Blocked" };

function dot() { return '<span class="pill-dot"></span>'; }
function pill(s) { return `<span class="pill pill-${s}">${dot()}${SL[s]||s}</span>`; }
function pct(n, d) { return d > 0 ? Math.round(n / d * 100) : 0; }
function esc(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function tierLabel(t) { return { "1":"T1", "2":"T2", "3":"T3", done:"Solid" }[t] || t; }
function tierClass(t) { return { "1":"t1", "2":"t2", "3":"t3", done:"done" }[t] || ""; }
function ownerLabel(o) { return { design:"Design", engineering:"Engineering", all:"All", product:"Product" }[o] || o; }
function figmaDotClass(s) {
  if (s === 'done' || s === 'ready_for_eng') return 'done';
  if (s === 'in_progress' || s === 'partial' || s === 'changes_needed') return 'in_progress';
  return 'missing';
}

function score(c) {
  let s=0,t=0;
  if(c.figma!=="na"){t+=2;if(c.figma==="done")s+=2;else if(c.figma==="partial"||c.figma==="in_progress"||c.figma==="ready_for_eng"||c.figma==="changes_needed")s+=1;}
  if(c.waxStatus!=="na"){t+=2;if(c.waxStatus==="done")s+=2;else if(c.waxStatus==="in_progress")s+=1;}
  if(c.themeReady){s+=1;} t+=1;
  if(c.storybook!=="na"){t+=1;if(c.storybook==="done")s+=1;}
  if(c.codeConnect!=="na"){t+=1;if(c.codeConnect==="done")s+=1;}
  return t>0?s/t:0;
}
function overall(c) { const s=score(c); return s>=0.9?"done":s>=0.3?"partial":"missing"; }

function toggleGroup(statusKey) {
  const group = document.getElementById('group-' + statusKey);
  if (group) group.classList.toggle('collapsed');
}

function toggleCompRow(summaryEl) {
  summaryEl.closest('.comp-row').classList.toggle('expanded');
}

function changeWorkflow(name, value) {
  updateComponent(name, 'workflowStatus', value);
  renderOverview();
  renderComponents();
}

function changeField(name, field, value) {
  updateComponent(name, field, value);
  if (field === 'figma' || field === 'waxStatus' || field === 'themeReady' || field === 'agentReady' || field === 'themes' || field === 'storybook' || field === 'codeConnect') {
    renderComponents();
  }
}

function toggleTheme(name, theme, checked) {
  const comp = COMPONENTS.find(c => c.name === name);
  if (!comp) return;
  let themes = [...(comp.themes || [])];
  if (checked && !themes.includes(theme)) themes.push(theme);
  if (!checked) themes = themes.filter(t => t !== theme);
  updateComponent(name, 'themes', themes);
  renderComponents();
}

function addThemeOption(inputEl) {
  const val = inputEl.value.trim();
  if (!val || THEME_OPTIONS.includes(val)) { inputEl.value = ''; return; }
  THEME_OPTIONS.push(val);
  localStorage.setItem('ds-theme-options', JSON.stringify(THEME_OPTIONS));
  inputEl.value = '';
  renderComponents();
  renderOverview();
}

// ROADMAP TASK MANAGEMENT
// ═══════════════════════════════════════════

function saveRoadmap() { localStorage.setItem('ds-roadmap', JSON.stringify(ROADMAP)); }

function loadRoadmap() {
  const saved = JSON.parse(localStorage.getItem('ds-roadmap') || 'null');
  if (!saved) return;
  ROADMAP.length = 0;
  saved.forEach(p => ROADMAP.push(p));
  // Merge any new default tasks/phases without overwriting user progress
  DEFAULT_ROADMAP.forEach(defaultPhase => {
    const existing = ROADMAP.find(p => p.phase === defaultPhase.phase);
    if (!existing) {
      ROADMAP.push(JSON.parse(JSON.stringify(defaultPhase)));
      return;
    }
    defaultPhase.tasks.forEach(dt => {
      if (!existing.tasks.some(t => t.text === dt.text)) {
        existing.tasks.push({ ...dt });
      }
    });
  });
}

function toggleRoadmapTask(phaseIdx, taskIdx, checked) {
  ROADMAP[phaseIdx].tasks[taskIdx].done = checked;
  saveRoadmap();
  renderOverview();
}

function updateTaskText(phaseIdx, taskIdx, text) {
  ROADMAP[phaseIdx].tasks[taskIdx].text = text;
  saveRoadmap();
}

function updateProjectHero(field, value) {
  projectHero[field] = value;
  localStorage.setItem('ds-project-hero', JSON.stringify(projectHero));
}

function updatePhaseName(phaseIdx, name) {
  ROADMAP[phaseIdx].name = name;
  saveRoadmap();
}

function updatePhaseDuration(phaseIdx, duration) {
  ROADMAP[phaseIdx].duration = duration;
  saveRoadmap();
}

function addRoadmapTask(phaseIdx, text) {
  ROADMAP[phaseIdx].tasks.push({ text, done: false });
  saveRoadmap();
  renderOverview();
}

function removeRoadmapTask(phaseIdx, taskIdx) {
  ROADMAP[phaseIdx].tasks.splice(taskIdx, 1);
  saveRoadmap();
  renderOverview();
}

          <div class="detail-card eng-card"><div class="detail-card-header"><span class="detail-card-title">Wax</span>${waxSelectHtml(c)}</div><textarea class="detail-notes" onblur="changeField('${esc(c.name)}','codeNotes',this.value)">${c.codeNotes||''}</textarea></div>
          <div class="detail-card eng-card"><div class="detail-card-header"><span class="detail-card-title">Theming</span></div><div class="detail-theme-section"><label class="theme-check-label"><input type="checkbox" ${c.themeReady?'checked':''} onchange="changeField('${esc(c.name)}','themeReady',this.checked)">Theme-ready</label><div class="theme-checks-detail">${THEME_OPTIONS.map(t => `<label class="theme-check-label"><input type="checkbox" ${(c.themes||[]).includes(t)?'checked':''} onchange="toggleTheme('${esc(c.name)}','${esc(t)}',this.checked)">${t}</label>`).join('')}</div><div class="add-theme-row"><input class="add-theme-input" placeholder="+ Add theme" onkeydown="if(event.key==='Enter')addThemeOption(this)"></div></div></div>
          <div class="detail-card eng-card"><div class="detail-card-header"><span class="detail-card-title">Storybook</span>${sbSelectHtml(c)}</div><textarea class="detail-notes" onblur="changeField('${esc(c.name)}','storybookNotes',this.value)">${c.storybookNotes||''}</textarea></div>
          <div class="detail-card eng-card"><div class="detail-card-header"><span class="detail-card-title">Code Connect</span>${ccSelectHtml(c)}</div><textarea class="detail-notes" onblur="changeField('${esc(c.name)}','codeConnectNotes',this.value)">${c.codeConnectNotes||''}</textarea></div>
        </div>
        <div class="assignment-row">
          <div class="assignment-field"><span class="assignment-label">Project</span><input class="assignment-input" type="text" value="${esc(c.project||'')}" onblur="changeField('${esc(c.name)}','project',this.value)" placeholder="e.g. Q1 Biomarkers"></div>
          <div class="assignment-field"><span class="assignment-label">Team</span><input class="assignment-input" type="text" value="${esc(c.team||'')}" onblur="changeField('${esc(c.name)}','team',this.value)" placeholder="e.g. Commerce"></div>
          <div class="assignment-field"><span class="assignment-label">Engineer</span><input class="assignment-input" type="text" value="${esc(c.engineer||'')}" onblur="changeField('${esc(c.name)}','engineer',this.value)" placeholder="e.g. Sarah K."></div>
        </div>
      </div></td>
    </tr>`;
  });
  document.getElementById('table-body').innerHTML = html;
}

function renderCards() {
  const filtered = COMPONENTS.filter(matchesFilter);
  if (!filtered.length) { document.getElementById('card-view').innerHTML = '<div class="empty" style="grid-column:1/-1">No components match.</div>'; return; }
  document.getElementById('card-view').innerHTML = filtered.map(c =>
    `<div class="comp-card"><div class="comp-card-head"><span class="comp-name">${c.name}</span><span class="category-label">${c.cat}</span></div>
    <div class="comp-card-body">
      <div class="comp-card-row"><span class="row-label">Figma</span>${pill(c.figma)}</div>
      <div class="comp-card-row"><span class="row-label">Wax</span>${pill(c.waxStatus === 'done' ? 'done' : c.waxStatus === 'in_progress' ? 'partial' : 'missing')}</div>
      <div class="comp-card-row"><span class="row-label">Storybook</span>${pill(c.storybook)}</div>
      <div class="comp-card-row"><span class="row-label">Code Connect</span>${pill(c.codeConnect)}</div>
    </div></div>`
  ).join('');
}

function toggleTableDetail(name) {
  const id = 'detail-' + name.replace(/[\s\/()]/g, '_');
  const row = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (row) {
    const open = row.style.display === 'none';
    row.style.display = open ? 'table-row' : 'none';
    if (chev) chev.classList.toggle('open', open);
  }
}

let compDragIdx = null;

function compDragStart(e) {
  const row = e.currentTarget;
  compDragIdx = parseInt(row.dataset.compIdx, 10);
  row.classList.add('dragging-row');
  e.dataTransfer.effectAllowed = 'move';
}

function compDragEnd(e) {
  compDragIdx = null;
  document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('dragging-row', 'drag-over-row'));
}

function compDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('drag-over-row'));
  if (row.dataset.compIdx !== undefined && parseInt(row.dataset.compIdx, 10) !== compDragIdx) {
    row.classList.add('drag-over-row');
  }
}

function compDrop(e) {
  e.preventDefault();
  const targetIdx = parseInt(e.currentTarget.dataset.compIdx, 10);
  if (compDragIdx === null || compDragIdx === targetIdx) return;
  const item = COMPONENTS.splice(compDragIdx, 1)[0];
  COMPONENTS.splice(targetIdx, 0, item);
  saveComponentOrder();
  renderTable();
  renderOverview();
}

function saveComponentOrder() {
  const order = COMPONENTS.map(c => c.name);
  localStorage.setItem('ds-comp-order', JSON.stringify(order));
}

function loadComponentOrder() {
  const saved = JSON.parse(localStorage.getItem('ds-comp-order') || 'null');
  if (!saved) return;
  const byName = {};
  COMPONENTS.forEach(c => byName[c.name] = c);
  const reordered = [];
  saved.forEach(name => { if (byName[name]) { reordered.push(byName[name]); delete byName[name]; } });
  Object.values(byName).forEach(c => reordered.push(c));
  COMPONENTS.length = 0;
  reordered.forEach(c => COMPONENTS.push(c));
}

function toggleAddComponent() {
  const form = document.getElementById('add-comp-form');
  const visible = form.style.display !== 'none';
  form.style.display = visible ? 'none' : 'flex';
  if (!visible) {
    const cats = [...new Set(COMPONENTS.map(c => c.cat))];
    const sel = document.getElementById('add-comp-cat');
    sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="__new__">+ New category…</option>';
    sel.onchange = function() {
      document.getElementById('add-comp-cat-new').style.display = this.value === '__new__' ? 'inline-block' : 'none';
    };
    document.getElementById('add-comp-name').value = '';
    document.getElementById('add-comp-cat-new').value = '';
    document.getElementById('add-comp-cat-new').style.display = 'none';
    document.getElementById('add-comp-name').focus();
  }
}

function submitAddComponent() {
  const nameInput = document.getElementById('add-comp-name');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  if (COMPONENTS.some(c => c.name.toLowerCase() === name.toLowerCase())) {
    alert('A component with that name already exists.');
    nameInput.focus();
    return;
  }
  const catSel = document.getElementById('add-comp-cat');
  let cat = catSel.value;
  if (cat === '__new__') {
    cat = document.getElementById('add-comp-cat-new').value.trim();
    if (!cat) { document.getElementById('add-comp-cat-new').focus(); return; }
  }
  const newComp = {
    name, cat, tier: "1", figma: "no_design", waxStatus: "not_started", themeReady: false, themes: [], storybook: "missing", codeConnect: "missing", workflowStatus: "backlog",
    figmaNotes: "", codeNotes: "", storybookNotes: "", codeConnectNotes: "",
    project: "", team: "", engineer: ""
  };
  COMPONENTS.push(newComp);
  saveComponentOrder();
  const overrides = loadOverrides();
  overrides[name] = { ...newComp };
  saveOverrides(overrides);
  localStorage.setItem('ds-added-components', JSON.stringify(
    JSON.parse(localStorage.getItem('ds-added-components') || '[]').concat([newComp])
  ));
  toggleAddComponent();
  renderCategoryNav();
  renderComponents();
  renderOverview();
}

function loadAddedComponents() {
  const added = JSON.parse(localStorage.getItem('ds-added-components') || '[]');
  added.forEach(ac => {
    if (!COMPONENTS.some(c => c.name === ac.name)) {
      COMPONENTS.push(ac);
    }
  });
}

function setCompFilter(btn, value) {
  statusFilter = value;
  btn.closest('.filters').querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() { renderTable(); renderCards(); }

function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
  if (view === 'table') {
    document.querySelector('.view-toggle-btn:first-child').classList.add('active');
    document.getElementById('table-view').style.display = 'block';
    document.getElementById('card-view').style.display = 'none';
  } else {
    document.querySelector('.view-toggle-btn:last-child').classList.add('active');
    document.getElementById('table-view').style.display = 'none';
    document.getElementById('card-view').style.display = 'grid';
  }
}

function setTokenFilter(val) {
  tokenStatusFilter = val;
  // Update pill active states
  document.querySelectorAll('#tok-filter-bar .filter-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.val === val);
  });
  renderTokenRows();
}

function setTokenSearch(val) {
  tokenSearch = val.toLowerCase();
  renderTokenRows();
}

function toggleLegacySection() {
  const sec = document.getElementById('legacy-section');
  if (sec) sec.classList.toggle('collapsed');
}

function tokBadge(s) {
  const labels = {match:'Match',value_mismatch:'Value Mismatch',naming_mismatch:'Naming Mismatch',figma_only:'Figma Only',wax_only:'Wax Only'};
  return `<span class="tok-badge ${s}">${labels[s]||s}</span>`;
}
function colorSwatch(val) {
  return /^#[0-9a-fA-F]{3,8}$/.test(val) ? `<span class="token-swatch" style="background:${val}"></span>` : '';
}
function buildTokenRows(list) {
  return list.filter(t => {
    if (tokenStatusFilter !== 'all' && t.s !== tokenStatusFilter) return false;
    if (tokenSearch) return t.n.toLowerCase().includes(tokenSearch) || t.wt.toLowerCase().includes(tokenSearch) || t.col.toLowerCase().includes(tokenSearch);
    return true;
  }).map(t => `<tr class="tok-row-${t.s}">
    <td><span class="tok-name">${esc(t.n)}</span></td>
    <td><span class="tok-col">${t.col}</span></td>
    <td><span class="tok-val">${colorSwatch(t.fv)}${esc(t.fv)}</span></td>
    <td><span class="tok-wax">${esc(t.wt)}</span></td>
    <td><span class="tok-val">${colorSwatch(t.wv)}${esc(t.wv)}</span></td>
    <td>${tokBadge(t.s)}</td>
  </tr>`).join('');
}

// Renders only the tbody rows — called on filter/search change without touching the input
function renderTokenRows() {
  const mainEl = document.getElementById('tok-main-tbody');
  const legacyEl = document.getElementById('tok-legacy-tbody');
  if (mainEl) mainEl.innerHTML = buildTokenRows(TOKEN_AUDIT) || '<tr><td colspan="6" class="empty">No tokens match.</td></tr>';
  if (legacyEl) legacyEl.innerHTML = buildTokenRows(LEGACY_TOKENS) || '<tr><td colspan="6" class="empty">No tokens match.</td></tr>';
}

function renderCategoryNav() {
  const cats = [...new Set(COMPONENTS.map(c => c.cat))];
  document.getElementById('category-nav').innerHTML = cats.map(cat =>
    `<div class="nav-item" onclick="filterCategory('${cat}')"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/></svg></span>${cat}<span class="nav-badge">${COMPONENTS.filter(c => c.cat === cat).length}</span></div>`
  ).join('');
}

function exportData() {
  const blob = new Blob([JSON.stringify({ components: COMPONENTS, tokens: TOKENS, phases: ROADMAP }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'design-system-data.json'; a.click();
}
